name: App am Leben erhalten

on:
  schedule:
    # Läuft alle 6 Stunden (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Erlaubt manuelles Starten

jobs:
  ping_app:
    runs-on: ubuntu-latest
    steps:
      - name: Sende Weckruf an Streamlit
        run: |
          curl -I -L https://lennartvoss.streamlit.app
