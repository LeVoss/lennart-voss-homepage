name: App am Leben erhalten

on:
  schedule:
    - cron: '0 */4 * * *' # Alle 4 Stunden - wir gehen auf Nummer sicher!
  workflow_dispatch:

jobs:
  ping_app:
    runs-on: ubuntu-latest
    steps:
      - name: Sende Weckruf
        run: |
          # Wir versuchen es 3-mal, falls Streamlit beim ersten Mal langsam ist
          curl -I -L --retry 3 https://lennartvoss.streamlit.app
